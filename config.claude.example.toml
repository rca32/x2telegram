[source]
provider = "bird"
timeline = "following"
count = 100
accounts_file = "examples/accounts.txt"

[summary]
provider = "coding_agent"
agent = "claude"
executable = "claude"
# model = "haiku" # 선택 사항. 비우면 Claude Code 기본 모델 사용
prompt_file = "prompts/timeline-summary.md"
timeout_seconds = 180
max_input_items = 50
max_output_chars = 8000

[telegram]
env_file = ".env"
disable_web_page_preview = true

[state]
path = "var/seen-tweets.json"

