[source]
provider = "bird"
timeline = "following"
count = 20
accounts_file = ""
auth_env_file = "x-oauth.env"

[summary]
provider = "coding_agent"
agent = "codex"
executable = "codex"
model = "gpt-5.6-terra" # 지능·속도·비용 균형 기본값
reasoning_effort = "medium"
prompt_file = "prompts/timeline-summary.md"
timeout_seconds = 180
max_input_items = 50
max_output_chars = 8000

[telegram]
env_file = ".env"
disable_web_page_preview = true

[state]
path = "var/seen-tweets.json"
