[source]
provider = "bird"
timeline = "following"
count = 100
accounts_file = "examples/accounts.txt"
auth_env_file = "x-oauth.env"

[summary]
provider = "coding_agent"
agent = "codex"
executable = "codex"
# model = "" # 비워 두면 Codex CLI 기본 모델 사용
prompt_file = "prompts/timeline-summary.md"
timeout_seconds = 180
max_input_items = 50
max_output_chars = 8000

[telegram]
env_file = ".env"
disable_web_page_preview = true

[state]
path = "var/seen-tweets.json"
